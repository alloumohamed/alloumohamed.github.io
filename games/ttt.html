<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Tic Tac Toe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html,body{
height:100%;
background:#151515;
overflow:hidden;
}

body{
display:flex;
color:white;
}

:root{

--bg:#181818;
--panel:#202020;
--panel2:#292929;
--line:#0f0f0f;

--blue:#4aa9ea;
--red:#ea4667;

--shadow:0 12px 40px rgba(0,0,0,.35);

}

#sidebar{

position:fixed;

left:-310px;

top:0;

width:310px;

height:100%;

background:var(--panel);

transition:.35s;

z-index:100;

display:flex;

flex-direction:column;

box-shadow:var(--shadow);

}

#sidebar.open{

left:0;

}

#overlay{

position:fixed;

inset:0;

background:rgba(0,0,0,.5);

opacity:0;

pointer-events:none;

transition:.3s;

z-index:90;

}

#overlay.show{

opacity:1;

pointer-events:auto;

}

.logo{

height:75px;

display:flex;

align-items:center;

justify-content:center;

gap:12px;

font-size:24px;

font-weight:700;

background:#242424;

border-bottom:1px solid #333;

}

.logo i{

color:var(--blue);

}

.section{

padding:20px;

display:flex;

flex-direction:column;

gap:15px;

}

.section h2{

font-size:14px;

letter-spacing:1px;

color:#999;

text-transform:uppercase;

}

.option{

display:flex;

align-items:center;

gap:12px;

font-size:16px;

}

.option input{

transform:scale(1.2);

accent-color:var(--blue);

}

.sliderBox{

display:flex;

align-items:center;

gap:12px;

}

.sliderBox input{

flex:1;

accent-color:var(--blue);

}

#level{

width:36px;

text-align:center;

font-weight:600;

}

select{

height:46px;

background:#2d2d2d;

color:white;

border:none;

outline:none;

padding:10px;

border-radius:12px;

font-size:15px;

}

button{

height:48px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:600;

transition:.25s;

}

#newGame{

background:var(--blue);

color:white;

}

#newGame:hover{

transform:translateY(-2px);

}

#resetScore{

background:var(--red);

color:white;

}

#main{

flex:1;

display:flex;

flex-direction:column;

align-items:center;

}

header{

width:100%;

height:70px;

background:#202020;

display:flex;

align-items:center;

padding:0 20px;

box-shadow:0 3px 12px rgba(0,0,0,.3);

}

#menu{

font-size:24px;

cursor:pointer;

}

header h1{

flex:1;

text-align:center;

font-size:22px;

font-weight:600;

}

#status{

margin-top:25px;

font-size:20px;

font-weight:600;

}

#board{

margin-top:30px;

width:min(92vw,420px);

aspect-ratio:1;

display:grid;

grid-template-columns:repeat(3,1fr);

grid-template-rows:repeat(3,1fr);

background:var(--line);

gap:6px;

border-radius:22px;

padding:6px;

box-shadow:var(--shadow);

}

.cell{

background:#1d1d1d;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

position:relative;

overflow:hidden;

transition:.2s;

}

.cell:hover{

filter:brightness(1.08);

}

.cell.o{

background:var(--blue);

}

.cell.x{

background:var(--red);

}

.cell::before,
.cell::after{
content:"";
position:absolute;
transition:.25s;
}

.cell.o::before{
width:58%;
height:58%;
border:10px solid #fff;
border-radius:50%;
}

.cell.x::before{
width:12%;
height:65%;
background:#fff;
border-radius:20px;
transform:rotate(45deg);
}

.cell.x::after{
width:12%;
height:65%;
background:#fff;
border-radius:20px;
transform:rotate(-45deg);
}

.cell.win{
animation:win .8s infinite alternate;
}

@keyframes win{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}

#scoreboard{

margin-top:30px;

width:min(92vw,420px);

display:grid;

grid-template-columns:repeat(3,1fr);

gap:15px;

}

.score{

background:#242424;

padding:18px;

border-radius:16px;

text-align:center;

box-shadow:var(--shadow);

}

.score:first-child{

border-bottom:5px solid var(--blue);

}

.score:last-child{

border-bottom:5px solid var(--red);

}

.score div{

font-size:14px;

color:#aaa;

}

.score span{

display:block;

font-size:28px;

font-weight:700;

margin-top:8px;

}

@media(max-width:650px){

header h1{

font-size:20px;

}

#status{

font-size:18px;

}

}

</style>

</head>

<body>

<div id="overlay"></div>

<div id="sidebar">

<div class="logo">

<i class="fa-solid fa-gamepad"></i>

<span>Tic Tac Toe</span>

</div>

<div class="section">

<h2>Game Mode</h2>

<label class="option">

<input
type="radio"
name="mode"
value="pvp"
checked>

<span>Player vs Player</span>

</label>

<label class="option">

<input
type="radio"
name="mode"
value="ai">

<span>Player vs AI</span>

</label>

<h2>AI Difficulty</h2>

<div class="sliderBox">

<input
id="difficulty"
type="range"
min="1"
max="10"
value="5">

<div id="level">5</div>

</div>

<h2>First Turn</h2>

<select id="firstTurn">

<option value="player">Player</option>

<option value="ai">AI</option>

<option value="random">Random</option>

</select>

<button id="newGame">

New Game

</button>

<button id="resetScore">

Reset Score

</button>

</div>

</div>

<div id="main">

<header>

<i id="menu" class="fa-solid fa-bars"></i>

<h1>Tic Tac Toe</h1>

</header>

<div id="status">

Player O Turn

</div>

<div id="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<div id="scoreboard">

<div class="score">
<div>O</div>
<span id="oScore">0</span>
</div>

<div class="score">
<div>Draw</div>
<span id="drawScore">0</span>
</div>

<div class="score">
<div>X</div>
<span id="xScore">0</span>
</div>

</div>

</div>

<script>

const board=document.getElementById("board");
const cells=[...document.querySelectorAll(".cell")];

const menu=document.getElementById("menu");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

const status=document.getElementById("status");

const difficulty=document.getElementById("difficulty");
const level=document.getElementById("level");

const newGame=document.getElementById("newGame");
const resetScore=document.getElementById("resetScore");

const modeInputs=document.querySelectorAll("input[name=mode]");

const firstTurn=document.getElementById("firstTurn");

let game=[
"",
"",
"",
"",
"",
"",
"",
"",
""
];

let current="O";

let running=true;

let mode="pvp";

let aiLevel=5;

let scoreO=0;

let scoreX=0;

let scoreDraw=0;

const wins=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

menu.onclick=()=>{
sidebar.classList.add("open");
overlay.classList.add("show");
};

overlay.onclick=()=>{
sidebar.classList.remove("open");
overlay.classList.remove("show");
};

difficulty.oninput=()=>{
aiLevel=Number(difficulty.value);
level.textContent=aiLevel;
};

modeInputs.forEach(r=>{

r.onchange=()=>{

mode=r.value;

startGame();

};

});

newGame.onclick=startGame;

resetScore.onclick=()=>{

scoreO=0;
scoreX=0;
scoreDraw=0;

updateScores();

startGame();

};

function updateScores(){

oScore.textContent=scoreO;
xScore.textContent=scoreX;
drawScore.textContent=scoreDraw;

}

function startGame(){

game=["","","","","","","","",""];

running=true;

current="O";

cells.forEach(c=>{

c.className="cell";

});

status.textContent="Player O Turn";

let first=firstTurn.value;

if(mode==="ai"){

if(first==="random")
first=Math.random()<0.5?"player":"ai";

if(first==="ai"){

current="X";

status.textContent="AI Thinking...";

setTimeout(aiMove,450);

}

}

}

cells.forEach(cell=>{

cell.onclick=()=>{

if(!running) return;

let index=Number(cell.dataset.index);

if(game[index]!="") return;

if(mode==="ai"&&current==="X") return;

play(index,current);

if(mode==="ai"&&running){

current="X";

status.textContent="AI Thinking...";

setTimeout(aiMove,350);

}

};

});

function play(index,symbol){

game[index]=symbol;

cells[index].classList.add(symbol.toLowerCase());

if(checkWinner(symbol)){

running=false;

status.textContent=symbol+" Wins";

if(symbol==="O")
scoreO++;
else
scoreX++;

updateScores();

return;

}

if(game.every(x=>x!="")){

running=false;

scoreDraw++;

updateScores();

status.textContent="Draw";

return;

}

current=symbol==="O"?"X":"O";

if(mode==="pvp")
status.textContent="Player "+current+" Turn";

}

function checkWinner(symbol){

for(const line of wins){

const[a,b,c]=line;

if(

game[a]===symbol&&

game[b]===symbol&&

game[c]===symbol

){

cells[a].classList.add("win");

cells[b].classList.add("win");

cells[c].classList.add("win");

return true;

}

}

return false;

}

function aiMove(){

if(!running) return;

let move;

if(aiLevel<=2){

move=randomMove();

}

else if(aiLevel<=4){

move=Math.random()<0.6?

bestMove():

randomMove();

}

else if(aiLevel<=6){

move=Math.random()<0.8?

bestMove():

randomMove();

}

else{

move=bestMove();

}

play(move,"X");

}

function randomMove(){

const empty=[];

game.forEach((v,i)=>{

if(v==="")
empty.push(i);

});

return empty[Math.floor(Math.random()*empty.length)];

}

function bestMove(){

let best=-Infinity;

let move=0;

for(let i=0;i<9;i++){

if(game[i]===""){

game[i]="X";

let score=minimax(game,false);

game[i]="";

if(score>best){

best=score;

move=i;

}

}

}

return move;

}

function minimax(board,isMax){

let result=evaluate();

if(result!==null)
return result;

if(isMax){

let best=-Infinity;

for(let i=0;i<9;i++){

if(board[i]===""){

board[i]="X";

best=Math.max(best,minimax(board,false));

board[i]="";

}

}

return best;

}

let best=Infinity;

for(let i=0;i<9;i++){

if(board[i]===""){

board[i]="O";

best=Math.min(best,minimax(board,true));

board[i]="";

}

}

return best;

}

function evaluate(){

for(const line of wins){

const[a,b,c]=line;

if(

game[a]!==""&&

game[a]===game[b]&&

game[a]===game[c]

){

if(game[a]==="X")
return 10;

return -10;

}

}

if(game.every(v=>v!==""))
return 0;

return null;

}

startGame();

</script>

</body>
</html>
